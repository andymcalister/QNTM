name: QNTM Nightly Data Refresh

on:
  schedule:
    # 2:00 AM UTC daily (6 PM PT / 9 PM ET — after US market close + settlement)
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Bypass freshness check (force full refresh)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      tickers:
        description: "Comma-separated tickers to refresh (blank = full universe)"
        required: false
        default: ""

jobs:
  refresh:
    name: Refresh Universe & Score
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      ENCRYPTION_KEY:       ${{ secrets.ENCRYPTION_KEY }}
      ENVIRONMENT:          dev

    steps:
      - name: Checkout dev branch
        uses: actions/checkout@v4
        with:
          ref: dev

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run nightly refresh
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            ARGS="$ARGS --force"
          fi
          if [ -n "${{ github.event.inputs.tickers }}" ]; then
            TICKER_LIST=$(echo "${{ github.event.inputs.tickers }}" | tr ',' ' ')
            ARGS="$ARGS --tickers $TICKER_LIST"
          fi

          echo "Running: python data_refresh.py $ARGS"
          python data_refresh.py $ARGS | tee refresh_output.json

      - name: Log refresh summary
        if: always()
        run: |
          echo "──────────────────────────────────────"
          echo "QNTM Nightly Refresh — Summary"
          echo "──────────────────────────────────────"
          cat refresh_output.json 2>/dev/null || echo "(no output file)"

      - name: Check refresh result
        if: always()
        run: |
          python3 - <<'EOF'
          import json, sys
          try:
              with open('refresh_output.json') as f:
                  content = f.read()
              # Find the JSON block (last {...} in output)
              start = content.rfind('{')
              end   = content.rfind('}') + 1
              r = json.loads(content[start:end])
              if r.get('skipped'):
                  print('Cache was fresh — refresh skipped.')
              elif r.get('success'):
                  print(f"Success: {r.get('live_count',0)}/{r.get('total',0)} tickers | {r.get('duration_s',0)}s | regime={r.get('macro_regime','unknown')}")
              else:
                  print(f"Refresh failed: {r.get('error','unknown')}")
                  sys.exit(1)
          except Exception as e:
              print(f'Could not parse output: {e}')
              sys.exit(1)
          EOF
